version: "2"
run:
  issues-exit-code: 1
  tests: true
linters:
  default: none
  enable:
    - asasalint
    - bodyclose
    - errcheck
    - errorlint
    - gocritic
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - modernize
    - perfsprint
    - revive
    - staticcheck
    - testifylint
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - usetesting
  settings:
    gocritic:
      disabled-checks:
        - appendAssign
        - commentedOutCode
        - dupArg
        - hugeParam
        - importShadow
        - preferDecodeRune
        - rangeValCopy
        - unnamedResult
        - whyNoLint
      enable-all: true
    misspell:
      locale: US
      ignore-rules:
        - cancelled
    modernize:
      disable:
        - omitzero
    perfsprint:
      int-conversion: true
      err-error: true
      errorf: true
      sprintf1: true
      strconcat: true
    revive:
      confidence: 0.01
      enable-all-rules: false
      enable-default-rules: true
      max-open-files: 2048
      rules:
        - name: blank-imports
        - name: bool-literal-in-expr
        - name: constant-logical-expr
        - name: context-as-argument
          arguments:
            - allow-types-before: '*testing.T'
          disabled: true
        - name: context-keys-type
        - name: deep-exit
        - name: defer
          arguments:
            - - call-chain
              - loop
        - name: dot-imports
        - name: duplicated-imports
        - name: early-return
          arguments:
            - preserve-scope
        - name: empty-block
        - name: empty-lines
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: exported
          arguments:
            - say-repetitive-instead-of-stutters
        - name: flag-parameter
        - name: identical-branches
        - name: if-return
        - name: import-shadowing
        - name: increment-decrement
        - name: indent-error-flow
          arguments:
            - preserve-scope
        - name: package-comments
        - name: range
        - name: range-val-in-closure
        - name: range-val-address
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: string-format
          arguments:
            - - panic
              - /^[^\n]*$/
              - must not contain line breaks
        - name: struct-tag
        - name: superfluous-else
          arguments:
            - preserve-scope
        - name: time-equal
        - name: unconditional-recursion
        - name: unexported-return
        - name: unhandled-error
          arguments:
            - fmt.Fprint
            - fmt.Fprintf
            - fmt.Fprintln
            - fmt.Print
            - fmt.Printf
            - fmt.Println
        - name: unused-parameter
        - name: unused-receiver
        - name: unnecessary-stmt
        - name: use-any
        - name: useless-break
        - name: var-declaration
        - name: var-naming
          arguments:
            - ["ID"] # AllowList
            - ["Otel", "Aws", "Gcp"] # DenyList
            - - skip-package-name-collision-with-go-std: true
        - name: waitgroup-by-value
    testifylint:
      enable-all: true
      disable:
        - float-compare
        - go-require
        - require-error
    usetesting:
      context-background: true
      context-todo: true
  exclusions:
    generated: lax
    presets:
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Yes, they are, but it's okay in a test.
      - linters:
          - revive
        path: _test\.go
        text: exported func.*returns unexported type.*which can be annoying to use
      # It's okay to not run gosec and perfsprint in a test.
      - linters:
          - gosec
          - perfsprint
        path: _test\.go
      # Ignoring gosec G404: Use of weak random number generator (math/rand instead of crypto/rand)
      # as we commonly use it in tests and examples.
      - linters:
          - gosec
        text: 'G404:'
      # Ignoring gosec G402: TLS MinVersion too low
      # as the https://pkg.go.dev/crypto/tls#Config handles MinVersion default well.
      - linters:
          - gosec
        text: 'G402: TLS MinVersion too low.'
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofumpt
    - goimports
    - golines
  settings:
    gofumpt:
      extra-rules: true
    golines:
      max-len: 120
